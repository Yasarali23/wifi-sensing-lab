# Mosquitto MQTT Broker Configuration

# Default listener
listener 1883
protocol mqtt

# WebSocket listener
listener 9001
protocol websockets

# Allow anonymous connections (for demo)
allow_anonymous true

# Enable persistence
persistence true
persistence_location /mosquitto/data/

# Set max connections
max_connections -1

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true
